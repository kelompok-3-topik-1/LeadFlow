{% load static %}
<link rel="stylesheet" href="{% static 'leads/login.css' %}">
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #EBEFFF;
    display: flex;
    height: 100vh;
}

/* RIGHT PANEL */
.right-panel {
    width: 35%;
    background: #AFB3FF;
    position: relative;
}

/* LEFT CONTENT */
.container {
    width: 65%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 400px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
label {
    display: block;
    margin: 10px 0 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 50px;
    border: 1px solid #656ED3;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    margin-top: 20px;
    border-radius: 50px;
    border: none;
    background: #656ED3;
    color: #AFB3FF;
    font-weight: bold;
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 20px;
}

.social {
    margin-top: 10px;
}

.social span {
    margin: 0 5px;
    color: #656ED3;
    font-weight: bold;
}

/* DECORATION */
.shape1 {
    position: absolute;
    width: 500px;
    height: 120px;
    background: #838CF1;
    border-radius: 100px;
    transform: rotate(-40deg);
    bottom: 50px;
    left: -200px;
}

.shape2 {
    position: absolute;
    width: 500px;
    height: 120px;
    background: #AFB3FF;
    border-radius: 100px;
    transform: rotate(-40deg);
    bottom: 30px;
    left: -180px;
}
</style>
</head>

<body>

<div class="container">
    <div class="login-box">
        <h2>Welcome Back!</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Email:</label>
            <input type="text" name="email" placeholder="Enter username" required>

            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="footer">
            <p>Belum punya akun? 
                <a href="{% url 'register' %}">Register</a>
            </p>
            <div class="social">
                <span>●</span>
                <span>●</span>
                <span>●</span>
            </div>
        </div>
    </div>
</div>

<div class="right-panel">
    <div class="shape1"></div>
    <div class="shape2"></div>
</div>

</body>
</html>
